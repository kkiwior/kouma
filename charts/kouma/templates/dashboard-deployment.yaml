apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kouma.fullname" . }}-dashboard
  labels:
    {{- include "kouma.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "kouma.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/shared-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/shared-secret.yaml") . | sha256sum }}
        {{- with .Values.dashboard.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kouma.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ include "kouma.dashboard.image" . | quote }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          {{- with .Values.dashboard.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kouma.configmapName" . }}
            {{- if and (not .Values.mongodb.enabled) .Values.externalMongodb.existingSecret }}
            - secretRef:
                name: {{ .Values.externalMongodb.existingSecret }}
            {{- else }}
            - secretRef:
                name: {{ include "kouma.fullname" . }}-secret
            {{- end }}
          env:
            {{- if ne .Values.dashboard.auth.mode "none" }}
            - name: KOUMA_AUTH_MODE
              value: {{ .Values.dashboard.auth.mode | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.passcodeKey }}
            - name: KOUMA_PASSCODE_KEY
              value: {{ .Values.dashboard.auth.passcodeKey | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.tokenKey }}
            - name: KOUMA_AUTH_TOKEN_KEY
              value: {{ .Values.dashboard.auth.tokenKey | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.accessTokenSecret }}
            - name: KOUMA_ACCESS_TOKEN_SECRET
              value: {{ .Values.dashboard.auth.accessTokenSecret | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.microsoft.clientId }}
            - name: KOUMA_MICROSOFT_CLIENT_ID
              value: {{ .Values.dashboard.auth.microsoft.clientId | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.microsoft.clientSecret }}
            - name: KOUMA_MICROSOFT_CLIENT_SECRET
              value: {{ .Values.dashboard.auth.microsoft.clientSecret | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.microsoft.tenantId }}
            - name: KOUMA_MICROSOFT_TENANT_ID
              value: {{ .Values.dashboard.auth.microsoft.tenantId | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.google.clientId }}
            - name: KOUMA_GOOGLE_CLIENT_ID
              value: {{ .Values.dashboard.auth.google.clientId | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.google.clientSecret }}
            - name: KOUMA_GOOGLE_CLIENT_SECRET
              value: {{ .Values.dashboard.auth.google.clientSecret | quote }}
            {{- end }}
            {{- if .Values.dashboard.auth.oauthAllowedDomains }}
            - name: KOUMA_OAUTH_ALLOWED_DOMAINS
              value: {{ .Values.dashboard.auth.oauthAllowedDomains | quote }}
            {{- end }}
            {{- with .Values.common.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.dashboard.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: exchange-volume
              mountPath: /exchange
          {{- with .Values.dashboard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: exchange-volume
          {{- if .Values.exchange.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kouma.exchangePvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
