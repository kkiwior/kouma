name: Publish

on:
    push:
        tags:
            - 'dashboard-v*'
            - 'engine-v*'
            - 'client-v*'
            - 'helm-v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to publish (e.g., 1.2.3)'
                required: true
                type: string

permissions:
    id-token: write
    contents: read
    packages: write

env:
    IMAGE_REGISTRY: ghcr.io/kkiwior/kouma

jobs:
    publish-dashboard:
        name: Publish Dashboard Docker Image
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/dashboard-v') || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v4

            - name: Extract version
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF#refs/tags/dashboard-v}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./dashboard
                  push: true
                  tags: |
                      ${{ env.IMAGE_REGISTRY }}/dashboard:${{ steps.version.outputs.version }}
                      ${{ env.IMAGE_REGISTRY }}/dashboard:latest

    publish-engine:
        name: Publish Engine Docker Image
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/engine-v') || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v4

            - name: Extract version
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF#refs/tags/engine-v}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./engine
                  push: true
                  tags: |
                      ${{ env.IMAGE_REGISTRY }}/engine:${{ steps.version.outputs.version }}
                      ${{ env.IMAGE_REGISTRY }}/engine:latest

    publish-client:
        name: Publish Client to npm
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/client-v') || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Extract version
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF#refs/tags/client-v}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install dependencies
              run: bun install

            - name: Set version
              working-directory: client
              run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

            - name: Build
              working-directory: client
              run: npm run build

            - name: Setup Node.js for npm publish
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'
                  registry-url: 'https://registry.npmjs.org'

            - name: Publish to npm
              working-directory: client
              run: npm publish --access public

    publish-helm:
        name: Publish Helm Chart
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/helm-v') || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v4

            - name: Extract version
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF#refs/tags/helm-v}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install Helm
              uses: azure/setup-helm@v4

            - name: Update Chart version
              run: |
                  VERSION=${{ steps.version.outputs.version }}
                  sed -i "s/^version:.*/version: ${VERSION}/" charts/kouma/Chart.yaml
                  sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kouma/Chart.yaml

            - name: Login to GHCR
              run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Package chart
              run: helm package charts/kouma

            - name: Push chart to GHCR
              run: helm push kouma-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
