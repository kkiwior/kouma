name: CI

on:
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    test-client:
        name: Test Client
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run tests
              working-directory: client
              run: bun test

    test-engine:
        name: Test Engine
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.26.0'

            - name: Install dependencies
              working-directory: engine
              run: go mod download

            - name: Run tests
              working-directory: engine
              run: go test ./...

    test-dashboard:
        name: Test Dashboard
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run backend tests
              working-directory: dashboard
              run: bun run test

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run oxlint
              run: bun run lint

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Type check client
              working-directory: client
              run: bun run typecheck

            - name: Type check dashboard
              working-directory: dashboard
              run: bun run typecheck
