name: Release

on:
    push:
        branches: [main, master]

permissions:
    contents: write
    issues: write
    pull-requests: write
    actions: write
    pages: write
    id-token: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Semantic Release
        runs-on: ubuntu-latest
        outputs:
            new_release_published: ${{ steps.semantic.outputs.new_release_published }}
            new_release_version: ${{ steps.semantic.outputs.new_release_version }}
            last_release_version: ${{ steps.semantic.outputs.last_release_version }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Install semantic-release
              run:
                  npm install --no-save semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/github
                  @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/exec

            - name: Semantic Release
              id: semantic
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release

            - name: Create component tags
              if: steps.semantic.outputs.new_release_published == 'true'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ steps.semantic.outputs.new_release_version }}
                  LAST_VERSION: ${{ steps.semantic.outputs.last_release_version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  for component in dashboard engine helm; do
                      git tag "${component}-v${VERSION}"
                  done

                  if [ -z "$LAST_VERSION" ] || [ "$LAST_VERSION" = "undefined" ]; then
                      git tag "client-v${VERSION}"
                  elif ! git diff --quiet "v${LAST_VERSION}"..HEAD -- client/; then
                      git tag "client-v${VERSION}"
                  else
                      echo "No changes in client since v${LAST_VERSION}, skipping client tag."
                  fi

                  git push origin --tags

            - name: Trigger publish workflow
              if: steps.semantic.outputs.new_release_published == 'true'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh workflow run publish.yml -f version=${{ steps.semantic.outputs.new_release_version }}

    docs:
        name: Deploy Docs
        runs-on: ubuntu-latest
        needs: release
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm install
              working-directory: docs

            - name: Build docs
              run: npm run build
              working-directory: docs

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/.vitepress/dist

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
